name: 🐍 Gerar Serpente das Contribuições

on:
  schedule:
    # Roda a cada 12 horas
    - cron: "0 */12 * * *"
  workflow_dispatch: # Permite rodar manualmente na aba "Actions"
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Gerar SVG da serpente (tema roxo arcano)
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#C77DFF&color_dots=#10021F,#5A189A,#7B2CBF,#9D4EDD,#C77DFF
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#C77DFF&color_dots=#10021F,#5A189A,#7B2CBF,#9D4EDD,#C77DFF

      - name: Publicar na branch "output"
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
